<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login-Grymus</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
</head>
<body id="login-body">
    <main class="admin-main">
            <header>Welcome</header>
            <!--ADMIN LOG IN-->
        <section id="admin-log-in-form">

            <fieldset>
                <legend> Admin Log In</legend>
                <form>
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Username" name="username" required>
                    <br>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <br>

                    <label><input type="checkbox" name="remember"> Remember me</label>
                    <br>

                    <button>log in</button>

                </form>

            </fieldset>
            <a class="main-site" href="../index.html">Go back to the main site</a>
        </section>
    </main>

</body>
</html>
